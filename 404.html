<!doctype html>
<html>
	<head>
		<meta charset="utf-8" />
		<script>
			const repo = '/react-vite-rr7-ghp-deploy';
			const path = window.location.pathname.slice(repo.length) || '/';
			const search = window.location.search;
			const hash = window.location.hash;
			const redirectUrl = repo + '/?redirect=' + encodeURIComponent(path + search + hash);
			window.location.replace(redirectUrl);
		</script>
	</head>
	<body></body>
</html>
